project:
  type: website
  output-dir: docs

website:
  title: "Michael Lopez"
  navbar:
    background: light
    left:
      - href: index.qmd
        text: Home
      - href: about.qmd
        text: About
      - href: resume.qmd
        text: Resume
    right:
      - icon: github
        href: https://github.com/yourusername
      - icon: linkedin
        href: https://linkedin.com/in/yourusername
  page-footer:
    center: |
      Built with [Quarto](https://quarto.org) and [Three.js](https://threejs.org)

format:
  html:
    theme:
      light: [cosmo, styles.scss]
    css: styles.css
    toc: false
    page-layout: full
    include-in-header:
      - text: |
          <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    include-after-body:
      - text: |
          <script src="js/theme-toggle.js"></script>
